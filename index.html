<style>
:root{--font:'Outfit',-apple-system,'Helvetica Neue',sans-serif;--bg:#f2f2f7;--white:#fff;--text:#1c1c1e;--text2:#3a3a3c;--text3:#636366;--text4:#aeaeb2;--glass:rgba(255,255,255,0.68);--glass-border:rgba(255,255,255,0.95);--blur:blur(28px) saturate(200%);--shadow:0 8px 32px rgba(0,0,0,0.09),0 1px 0 rgba(255,255,255,0.9) inset;--shadow-lg:0 20px 60px rgba(0,0,0,0.12),0 1px 0 rgba(255,255,255,0.95) inset;--ease:cubic-bezier(0.65,0,0.35,1);--ease-out:cubic-bezier(0.22,1,0.36,1);--nav:54px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);-webkit-font-smoothing:antialiased;color:var(--text)}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;will-change:transform;animation:float linear infinite}
.b1{width:800px;height:800px;background:radial-gradient(circle,#c7d7ff,#e8eeff 50%,transparent);top:-300px;left:-200px;animation-duration:26s}
.b2{width:600px;height:600px;background:radial-gradient(circle,#ffd6f0,#ffe8f6 50%,transparent);bottom:-200px;right:-100px;animation-duration:20s;animation-delay:-8s}
.b3{width:500px;height:500px;background:radial-gradient(circle,#d4f5e2,#e8faf0 50%,transparent);top:35%;left:50%;animation-duration:30s;animation-delay:-15s}
.b4{width:450px;height:450px;background:radial-gradient(circle,#fff0cc,#fffaec 50%,transparent);top:15%;right:15%;animation-duration:22s;animation-delay:-5s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(35px,-25px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.96)}}
nav{position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nav);background:rgba(242,242,247,0.8);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:.5px solid rgba(0,0,0,0.07);display:flex;align-items:center;padding:0 clamp(14px,3.5vw,56px);gap:0}
.nav-brand{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.02em;flex-shrink:0}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#007AFF,#5856D6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.3)}
.nav-pills{display:flex;gap:2px;margin-left:14px;flex-wrap:nowrap;overflow-x:auto;flex:1;scrollbar-width:none}
.nav-pills::-webkit-scrollbar{display:none}
.npill{font-size:12px;font-weight:600;font-family:var(--font);padding:5px 12px;border-radius:20px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:-.01em}
.npill:hover{background:rgba(0,0,0,.06);color:var(--text)}
.npill.on{background:rgba(0,0,0,.08);color:var(--text)}
.nav-right{font-size:11px;font-weight:600;color:var(--text4);flex-shrink:0;margin-left:10px;letter-spacing:.03em}
#pbar{position:fixed;top:var(--nav);left:0;height:2px;z-index:901;transition:width .5s var(--ease),background .4s;pointer-events:none;border-radius:0 2px 2px 0}
.pages{position:fixed;inset:0}
.pg{position:absolute;inset:0;top:var(--nav);opacity:0;pointer-events:none;transform:translateY(16px);transition:opacity .42s var(--ease),transform .42s var(--ease);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.12) transparent;padding:28px clamp(16px,4vw,60px) 40px}
.pg::-webkit-scrollbar{width:4px}
.pg::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:4px}
.pg.on{opacity:1;pointer-events:all;transform:none}
.pg.out-up{opacity:0;transform:translateY(-14px)}
.pg.out-dn{opacity:0;transform:translateY(14px)}
.hero-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:30px;text-align:center}
.h-tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#007AFF;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
.h-dot{width:6px;height:6px;border-radius:50%;background:#007AFF;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.h-title{font-size:clamp(52px,9vw,96px);font-weight:900;letter-spacing:-.05em;line-height:.9;color:var(--text);margin-bottom:6px}
.h-title .ac{color:#007AFF}
.h-sub{font-size:clamp(18px,2.5vw,26px);font-weight:300;color:var(--text3);letter-spacing:-.02em;margin-bottom:20px}
.h-desc{font-size:15px;color:var(--text3);max-width:440px;line-height:1.65;margin-bottom:36px}
.h-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:44px}
.btn-blue{font-family:var(--font);font-size:14px;font-weight:700;padding:12px 26px;border-radius:980px;border:none;background:#007AFF;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(0,122,255,.35);transition:all .2s;letter-spacing:-.01em}
.btn-blue:hover{background:#0066d6;transform:scale(1.03);box-shadow:0 6px 22px rgba(0,122,255,.42)}
.btn-gl{font-family:var(--font);font-size:14px;font-weight:700;padding:12px 26px;border-radius:980px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text2);cursor:pointer;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 3px 12px rgba(0,0,0,.07);transition:all .2s;letter-spacing:-.01em}
.btn-gl:hover{background:rgba(255,255,255,.85);transform:scale(1.03)}
.stats-row{display:flex;width:100%;max-width:680px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);box-shadow:var(--shadow-lg);border-radius:18px;overflow:hidden;margin-bottom:36px}
.stat{flex:1;padding:16px 8px;text-align:center;border-right:.5px solid rgba(0,0,0,.05)}
.stat:last-child{border-right:none}
.stat-n{font-size:clamp(18px,2.2vw,24px);font-weight:900;letter-spacing:-.03em;color:var(--text)}
.stat-l{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;width:100%;max-width:900px;margin-bottom:36px}
.role-card{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);box-shadow:var(--shadow);border-radius:16px;padding:20px 18px;cursor:pointer;transition:transform .25s var(--ease),box-shadow .25s;text-align:left;position:relative;overflow:hidden}
.role-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.role-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.rc-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.rc-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}
.rc-weeks{font-size:11px;font-weight:600;margin-bottom:4px}
.rc-desc{font-size:12px;color:var(--text3);line-height:1.45}
.role-pg-header{margin-bottom:24px}
.role-pg-num{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.role-pg-title{font-size:clamp(28px,4.5vw,52px);font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--text);margin-bottom:6px}
.role-pg-sub{font-size:15px;color:var(--text3);line-height:1.55}
.phase-block{margin-bottom:20px}
.phase-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text4);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.phase-label::after{content:'';flex:1;height:.5px;background:rgba(0,0,0,.08)}
.weeks-list{display:flex;flex-direction:column;gap:10px}
.wk{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);box-shadow:var(--shadow);border-radius:14px;overflow:hidden}
.wk-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:background .15s;user-select:none}
.wk-head:hover{background:rgba(255,255,255,.5)}
.wk-num-badge{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:20px;flex-shrink:0}
.wk-title-text{font-size:14px;font-weight:700;color:var(--text);flex:1;letter-spacing:-.01em}
.wk-goal{font-size:12px;color:var(--text4);flex-shrink:0;text-align:right;max-width:160px;line-height:1.3;display:none}
@media(min-width:600px){.wk-goal{display:block}}
.wk-toggle{font-size:14px;color:var(--text4);flex-shrink:0;transition:transform .3s var(--ease)}
.wk.open .wk-toggle{transform:rotate(180deg)}
.wk-body{max-height:0;overflow:hidden;transition:max-height .45s var(--ease)}
.wk.open .wk-body{max-height:2000px}
.wk-inner{padding:0 18px 18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.wk-inner{grid-template-columns:1fr}}
.wk-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text4);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.task-list{display:flex;flex-direction:column;gap:5px}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;background:rgba(255,255,255,.5);border-radius:8px;font-size:13px;color:var(--text2);line-height:1.45}
.task-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.res-list{display:flex;flex-direction:column;gap:6px}
.res-item{display:flex;flex-direction:column;gap:3px;padding:10px 12px;background:rgba(255,255,255,.5);border-radius:9px;border:.5px solid rgba(0,0,0,.07);transition:all .18s}
.res-item:hover{background:rgba(255,255,255,.85);transform:translateX(2px);box-shadow:0 3px 12px rgba(0,0,0,.07)}
.res-item-top{display:flex;align-items:center;gap:8px}
.res-emoji{font-size:15px;flex-shrink:0}
.res-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.res-type-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.06);color:var(--text3);flex-shrink:0}
.res-url{font-size:11px;color:#007AFF;text-decoration:none;padding-left:23px;word-break:break-all;transition:opacity .15s;display:block}
.res-url:hover{text-decoration:underline;opacity:.8}
.wk-deliver{grid-column:1/-1;padding:11px 14px;background:linear-gradient(135deg,rgba(0,122,255,.07),rgba(88,86,214,.04));border:1px solid rgba(0,122,255,.15);border-radius:10px;font-size:13px;color:var(--text2);line-height:1.5}
.wk-deliver strong{color:#007AFF;font-weight:700}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text3);background:var(--glass);border:1px solid rgba(0,0,0,.1);border-radius:20px;padding:6px 14px;cursor:pointer;margin-bottom:18px;transition:all .2s;font-family:var(--font);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.back-btn:hover{color:var(--text);background:rgba(255,255,255,.85)}
.sr{opacity:0;transform:translateY(16px);transition:opacity .45s var(--ease),transform .45s var(--ease)}
.sr.in{opacity:1;transform:none}
</style>
</head>

/* ROLE PAGES */
ROLES.forEach(r=>{
  const el=document.createElement('div');
  el.className='pg';el.id='pg-'+r.id;
  const phasesHTML=r.phases.map(ph=>`<div class="phase-block"><div class="phase-label sr">${ph.label}</div><div class="weeks-list sr">${ph.weeks.map(w=>buildWeekAccordion(w,r.color)).join('')}</div></div>`).join('');
  el.innerHTML=`<button class="back-btn sr" onclick="go('hero')">← All Roles</button><div class="role-pg-header sr"><div class="role-pg-num" style="color:${r.color}">${r.icon} ROLE ROADMAP · ${r.name.toUpperCase()}</div><div class="role-pg-title">${r.name}</div><div class="role-pg-sub">${r.desc} After completing the Common Foundation (Weeks 1–3), follow this path.</div></div>${phasesHTML}`;
  container.appendChild(el);
});

/* NAVIGATION */
const ALL=['hero','found',...ROLES.map(r=>r.id)];
let cur='hero',transitioning=false;

function go(id){
  if(id===cur||transitioning||!document.getElementById('pg-'+id)) return;
  transitioning=true;
  const prev=document.getElementById('pg-'+cur);
  const next=document.getElementById('pg-'+id);
  const dn=ALL.indexOf(id)>ALL.indexOf(cur);
  prev.classList.add(dn?'out-up':'out-dn');
  prev.classList.remove('on');
  setTimeout(()=>{prev.classList.remove('out-up','out-dn');prev.scrollTop=0;},450);
  next.classList.add('on');
  cur=id;
  transitioning=false;
  setTimeout(()=>{next.querySelectorAll('.sr').forEach((el,i)=>{el.classList.remove('in');setTimeout(()=>el.classList.add('in'),50+i*45);});},30);
  updateUI();
}

function updateUI(){
  const COLORS={'hero':'#007AFF','found':'#8E8E93',...Object.fromEntries(ROLES.map(r=>[r.id,r.color]))};
  const c=COLORS[cur]||'#007AFF';
  const idx=ALL.indexOf(cur);
  document.getElementById('pbar').style.cssText=`width:${((idx/(ALL.length-1))*100)}%;background:${c};box-shadow:0 0 8px ${c}55`;
  document.querySelectorAll('.npill').forEach((p,i)=>{p.classList.toggle('on',['found',...ROLES.map(r=>r.id)][i]===cur);});
  document.getElementById('navRight').textContent=cur==='hero'?'Path 1':cur==='found'?'Foundation':(ROLES.find(r=>r.id===cur)?.name||'');
}

function toggleWk(el){
  el.closest('.weeks-list')?.querySelectorAll('.wk.open').forEach(w=>{if(w!==el) w.classList.remove('open');});
  el.classList.toggle('open');
}

window.addEventListener('keydown',e=>{
  const idx=ALL.indexOf(cur);
  if(e.key==='ArrowRight'&&idx<ALL.length-1) go(ALL[idx+1]);
  if(e.key==='ArrowLeft'&&idx>0) go(ALL[idx-1]);
});

setTimeout(()=>{document.getElementById('pg-hero').querySelectorAll('.sr').forEach((el,i)=>setTimeout(()=>el.classList.add('in'),80+i*50));},60);
updateUI();
</script>
</body>
</html>
