<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis AI Project — Roadmap</title>
<meta name="description" content="The complete roadmap for the Jarvis AI Project by Suvendu.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.7}
::selection{background:rgba(99,102,241,.4);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* Cursor glow */
#cursor-glow{position:fixed;width:600px;height:600px;border-radius:50%;pointer-events:none;z-index:0;background:radial-gradient(circle,rgba(99,102,241,.06) 0%,transparent 70%);transform:translate(-50%,-50%)}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;transition:all .4s;background:rgba(0,0,0,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo{font-size:18px;font-weight:700;letter-spacing:-.5px;cursor:pointer}.nav-logo span{color:rgba(99,102,241,1)}
.nav-links{display:flex;gap:24px;align-items:center;flex-wrap:nowrap;overflow-x:auto}
.nav-links a{font-size:13px;font-weight:500;color:rgba(255,255,255,.45);transition:color .2s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-search-btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);display:flex;align-items:center;gap:8px;transition:all .2s}
.nav-search-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.nav-search-btn kbd{font-family:inherit;font-size:11px;padding:2px 6px;background:rgba(255,255,255,.08);border-radius:4px}

/* Pages */
.page{display:none;min-height:100vh;padding-top:64px}
.page.active{display:block;animation:pageIn .5s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Hero */
#hero-section{position:relative;min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-gradient{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(79,70,229,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 30% 60%,rgba(59,130,246,.08) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 70% 40%,rgba(139,92,246,.08) 0%,transparent 70%);animation:heroGlow 8s ease-in-out infinite alternate}
@keyframes heroGlow{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}
#particles-canvas{position:absolute;inset:0;z-index:1}
.hero-content{position:relative;z-index:2;max-width:900px;padding:0 24px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;font-size:13px;font-weight:600;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:rgba(99,102,241,1);margin-bottom:32px;letter-spacing:.5px}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-title{font-size:clamp(48px,8vw,80px);font-weight:800;letter-spacing:-3px;line-height:1.05;margin-bottom:24px}
.hero-title .word{display:inline-block;opacity:0;transform:translateY(30px);animation:wordReveal .6s ease forwards}
@keyframes wordReveal{to{opacity:1;transform:translateY(0)}}
.hero-subtitle{font-size:19px;font-weight:400;color:rgba(255,255,255,.5);line-height:1.6;max-width:600px;margin:0 auto 48px}

/* Landing cards */
.landing-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;max-width:800px;width:100%;padding:0 24px;position:relative;z-index:2;margin-top:16px}
.landing-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:40px 36px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;text-align:left}
.landing-card::before{content:'';position:absolute;inset:0;border-radius:20px;opacity:0;transition:opacity .35s}
.landing-card:hover{transform:translateY(-4px) scale(1.02);border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
.landing-card.green:hover::before{background:radial-gradient(ellipse at top,rgba(34,197,94,.08),transparent 70%);opacity:1}
.landing-card.blue:hover::before{background:radial-gradient(ellipse at top,rgba(59,130,246,.08),transparent 70%);opacity:1}
.landing-card-badge{display:inline-flex;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.badge-green{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.badge-blue{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}
.landing-card h3{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;position:relative;z-index:1}
.landing-card p{font-size:14px;color:rgba(255,255,255,.45);position:relative;z-index:1;line-height:1.6}
.landing-card .arrow{position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:24px;color:rgba(255,255,255,.2);transition:all .3s;z-index:1}
.landing-card:hover .arrow{color:rgba(255,255,255,.6);right:28px}

/* Section */
.section{padding:80px 48px;max-width:1200px;margin:0 auto}
.section-header{margin-bottom:48px}
.section-badge{display:inline-flex;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
.section-title{font-size:clamp(32px,5vw,48px);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:12px}
.section-subtitle{font-size:16px;color:rgba(255,255,255,.45);max-width:600px}

/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;color:rgba(255,255,255,.5);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);transition:all .2s;margin-bottom:32px;cursor:pointer}
.back-btn:hover{background:rgba(255,255,255,.08);color:#fff}

/* Glass card */
.glass-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;inset:0;border-radius:16px;opacity:0;transition:opacity .35s}
.glass-card:hover{transform:translateY(-2px) scale(1.01);border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.glass-card.green-glow:hover::before{background:radial-gradient(ellipse at top,rgba(34,197,94,.06),transparent 70%);opacity:1}
.glass-card.blue-glow:hover::before{background:radial-gradient(ellipse at top,rgba(59,130,246,.06),transparent 70%);opacity:1}

/* Week cards */
.weeks-grid{display:flex;flex-direction:column;gap:20px}
.week-card-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;position:relative;z-index:1}
.week-num{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.week-title{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-top:4px;position:relative;z-index:1}
.week-toggle{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.4);transition:all .2s;flex-shrink:0}
.week-toggle:hover{background:rgba(255,255,255,.08)}
.week-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1),padding .5s;position:relative;z-index:1}
.week-body.open{padding-top:20px}
.week-check{display:flex;align-items:center;gap:10px;cursor:pointer}
.week-check input[type=checkbox]{appearance:none;-webkit-appearance:none;width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);transition:all .2s;cursor:pointer;position:relative}
.week-check input[type=checkbox]:checked{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.5)}
.week-check input[type=checkbox]:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#22c55e}
.glass-card.completed{border-color:rgba(34,197,94,.15)}

/* Day list */
.day-item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}.day-item:last-child{border-bottom:none}
.day-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:4px}
.day-topic{font-size:15px;font-weight:600;margin-bottom:4px}
.day-detail{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6}

/* Tables */
.premium-table{width:100%;border-collapse:collapse;margin-top:12px}
.premium-table th{text-align:left;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.premium-table td{padding:10px 14px;font-size:13px;color:rgba(255,255,255,.6);border-bottom:1px solid rgba(255,255,255,.04)}
.premium-table tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.premium-table code{font-family:'SF Mono','Fira Code',monospace;font-size:12px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.05)}

/* Features grid */
.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:48px}
.feature-card{padding:24px}
.feature-icon{width:40px;height:40px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.15)}
.feature-title{font-size:15px;font-weight:700;margin-bottom:4px}.feature-desc{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:10px}
.feature-month-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;background:rgba(59,130,246,.08);color:rgba(59,130,246,.8);border:1px solid rgba(59,130,246,.12)}

/* Chips */
.chip-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:48px}
.chip{padding:7px 16px;border-radius:100px;font-size:12px;font-weight:600;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);transition:all .2s;white-space:nowrap}
.chip:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateY(-1px)}

/* Team */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:48px}
.team-card{text-align:center;padding:32px 20px}
.team-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(59,130,246,.3));margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;border:1px solid rgba(255,255,255,.08)}
.team-name{font-size:14px;font-weight:700;margin-bottom:3px}.team-role{font-size:12px;color:rgba(99,102,241,.8);font-weight:600;margin-bottom:6px}
.team-resp{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5}

/* Timeline */
.month-section{position:relative;padding-left:36px;margin-bottom:72px}
.month-section::before{content:'';position:absolute;left:11px;top:8px;bottom:0;width:1px;background:rgba(59,130,246,.15)}
.month-dot{position:absolute;left:4px;top:8px;width:16px;height:16px;border-radius:50%;background:rgba(59,130,246,.2);border:2px solid rgba(59,130,246,.5)}
.month-title{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.month-goal{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:24px;max-width:700px}
.checkpoint-list{margin-top:24px}
.checkpoint-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:13px;color:rgba(255,255,255,.5)}
.checkpoint-dot{width:6px;height:6px;border-radius:50%;background:rgba(59,130,246,.5);margin-top:6px;flex-shrink:0}

/* Rules */
.rule-list{list-style:none}
.rule-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;color:rgba(255,255,255,.6)}.rule-icon{font-size:15px;flex-shrink:0;margin-top:2px}

/* Resource links */
.resource-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.resource-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:500;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.55);transition:all .25s;text-decoration:none}
.resource-link:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:rgba(99,102,241,1);box-shadow:0 0 20px rgba(99,102,241,.08);transform:translateY(-1px)}
.resource-link::after{content:'↗';font-size:11px;opacity:.4}

/* Progress FAB */
#progress-fab{position:fixed;bottom:32px;right:32px;z-index:900;display:flex;align-items:center;gap:12px;padding:10px 20px 10px 12px;border-radius:100px;background:rgba(15,15,20,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:13px;font-weight:600;transition:all .3s}
#progress-fab:hover{border-color:rgba(255,255,255,.15);transform:scale(1.03)}
.progress-ring{width:32px;height:32px;transform:rotate(-90deg)}
.progress-ring-bg{stroke:rgba(255,255,255,.08);fill:none;stroke-width:3}
.progress-ring-fill{fill:none;stroke-width:3;stroke-linecap:round;stroke:#22c55e;transition:stroke-dashoffset .5s ease}

/* Search */
#search-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.8);backdrop-filter:blur(24px);display:none;align-items:flex-start;justify-content:center;padding-top:15vh}
#search-overlay.open{display:flex}
.search-container{width:600px;max-width:90vw}
.search-input-wrap{position:relative;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden}
.search-input-wrap input{width:100%;padding:18px 20px 18px 52px;font-size:17px;background:transparent;border:none;outline:none;color:#fff;font-family:inherit}
.search-input-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;color:rgba(255,255,255,.3)}
.search-results{margin-top:12px;max-height:50vh;overflow-y:auto;border-radius:14px}
.search-result-item{padding:14px 20px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.search-result-item:hover{background:rgba(255,255,255,.04)}
.search-result-type{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(99,102,241,.7);margin-bottom:3px}
.search-result-title{font-size:14px;font-weight:600}
.search-result-detail{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
mark{background:rgba(250,204,21,.25);color:#fbbf24;border-radius:2px;padding:0 2px}
.section-divider{max-width:1200px;margin:0 auto;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

footer{text-align:center;padding:60px 48px 40px;border-top:1px solid rgba(255,255,255,.04)}
footer p{font-size:13px;color:rgba(255,255,255,.2)}
@media(max-width:768px){nav{padding:0 16px}.nav-links{gap:14px}.section{padding:60px 16px}.landing-cards{grid-template-columns:1fr}.features-grid{grid-template-columns:1fr}.team-grid{grid-template-columns:1fr 1fr}.month-section{padding-left:24px}}
@media(max-width:480px){.team-grid{grid-template-columns:1fr}}

/* Edit modal */
.edit-modal-bg{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.8);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center}
.edit-modal-bg.open{display:flex}
.edit-modal{width:500px;max-width:90vw;background:rgba(20,20,25,1);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;max-height:80vh;overflow-y:auto}
.edit-modal h3{font-size:20px;font-weight:700;margin-bottom:20px}
.edit-modal label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:4px;margin-top:14px}
.edit-modal input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-family:inherit;font-size:14px;outline:none}
.edit-modal input:focus{border-color:rgba(99,102,241,.5)}
.edit-modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.edit-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s}
.edit-btn.primary{background:rgba(99,102,241,.8);color:#fff}.edit-btn.primary:hover{background:rgba(99,102,241,1)}
.edit-btn.secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}.edit-btn.secondary:hover{background:rgba(255,255,255,.1)}
.edit-team-btn{position:fixed;bottom:32px;left:32px;z-index:900;padding:10px 18px;border-radius:100px;background:rgba(15,15,20,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:13px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:all .3s}
.edit-team-btn:hover{border-color:rgba(255,255,255,.15);color:#fff;transform:scale(1.03)}
</style>
</head>
<body>
<div id="cursor-glow"></div>

<nav id="navbar">
  <div class="nav-logo" onclick="navigate('')">Jarvis<span>AI</span></div>
  <div class="nav-links" id="nav-links"></div>
</nav>

<div id="search-overlay">
  <div class="search-container">
    <div class="search-input-wrap"><span class="search-icon">⌕</span><input type="text" id="search-input" placeholder="Search roadmap..." autocomplete="off"></div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<!-- LANDING PAGE -->
<div id="page-landing" class="page active">
  <div id="hero-section">
    <div class="hero-gradient"></div>
    <canvas id="particles-canvas"></canvas>
    <div class="hero-content">
      <div class="hero-badge"><span class="dot"></span> Active Development</div>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
      <div class="landing-cards" id="landing-cards"></div>
    </div>
  </div>
</div>

<!-- PHASE 0 PAGE -->
<div id="page-phase0" class="page">
  <div class="section" id="phase0-content"></div>
  <footer><p id="footer-p0"></p></footer>
</div>

<!-- PATH 1 PAGE -->
<div id="page-path1" class="page">
  <div class="section" id="path1-content"></div>
  <footer><p id="footer-p1"></p></footer>
</div>

<div id="progress-fab">
  <svg class="progress-ring" viewBox="0 0 36 36"><circle class="progress-ring-bg" cx="18" cy="18" r="14"/><circle class="progress-ring-fill" id="progress-circle" cx="18" cy="18" r="14" stroke-dasharray="87.96" stroke-dashoffset="87.96"/></svg>
  <span id="progress-text">0 / 24 weeks</span>
</div>

<script>
let P0,P1,searchIndex=[],currentPage='';

function makeUrl(l){if(!l)return '#';l=l.trim();if(l.startsWith('http'))return l;return 'https://'+l;}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function resLink(r){const url=makeUrl(r.link);const isReal=url.startsWith('http');return isReal?`<a href="${url}" target="_blank" rel="noopener noreferrer" class="resource-link">${r.name}</a>`:`<span class="resource-link" title="${r.link||r.covers||''}">${r.name}</span>`;}

async function loadData(){
  try{
    const [r0,r1]=await Promise.all([fetch('p0.json'),fetch('p1.json')]);
    P0=await r0.json();P1=await r1.json();
    buildLanding();buildPhase0();buildPath1();handleRoute();initParticles();loadProgress();
  }catch(e){document.body.innerHTML='<div style="padding:100px;text-align:center;color:#fff"><h1>Error</h1><p>'+e.message+'</p></div>';}
}

// === NAVIGATION ===
function navigate(hash){window.location.hash=hash;}
window.addEventListener('hashchange',handleRoute);

function handleRoute(){
  const h=window.location.hash.replace('#','');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(h==='phase0'){document.getElementById('page-phase0').classList.add('active');currentPage='phase0';updateNav('phase0');window.scrollTo(0,0);}
  else if(h==='path1'){document.getElementById('page-path1').classList.add('active');currentPage='path1';updateNav('path1');window.scrollTo(0,0);}
  else{document.getElementById('page-landing').classList.add('active');currentPage='';updateNav('');window.scrollTo(0,0);}
  // Show/hide progress FAB on landing
  document.getElementById('progress-fab').style.display=currentPage?'flex':'none';
  updateProgress();
}

function updateNav(page){
  const nl=document.getElementById('nav-links');
  let html='';
  if(page==='phase0'&&P0){
    html='<a href="javascript:void(0)" onclick="navigate(\'\');return false;">Home</a>';
    P0.weeks.forEach(w=>{html+=`<a href="javascript:void(0)" onclick="scrollToEl('p0w${w.week-1}');return false;" class="nav-week-link">W${w.week}</a>`;});
    html+=`<button class="nav-search-btn" onclick="openSearch()">Search <kbd>⌘K</kbd></button>`;
  }else if(page==='path1'&&P1){
    html='<a href="javascript:void(0)" onclick="navigate(\'\');return false;">Home</a>';
    P1.months.forEach(m=>{html+=`<a href="javascript:void(0)" onclick="scrollToEl('p1m${m.month}');return false;" class="nav-month-link">Month ${m.month}</a>`;});
    html+=`<button class="nav-search-btn" onclick="openSearch()">Search <kbd>⌘K</kbd></button>`;
  }else{
    html='<button class="nav-search-btn" onclick="openSearch()">Search <kbd>⌘K</kbd></button>';
  }
  nl.innerHTML=html;
}

// === LANDING ===
function buildLanding(){
  const h1=document.getElementById('hero-title');
  ['Jarvis','AI','Project'].forEach((w,i)=>{const s=document.createElement('span');s.className='word';s.textContent=w+' ';s.style.animationDelay=`${.2+i*.15}s`;h1.appendChild(s);});
  document.getElementById('hero-subtitle').textContent=`Built by ${P0.created_by} and team`;
  document.getElementById('landing-cards').innerHTML=`
    <div class="landing-card green" onclick="navigate('phase0')">
      <div class="landing-card-badge badge-green">Phase 0</div>
      <h3>${P0.document.replace('Phase 0 — ','')}</h3>
      <p>${P0.duration} · ${P0.weeks.length} Weeks · ${P0.goal}</p>
      <div class="arrow">→</div>
    </div>
    <div class="landing-card blue" onclick="navigate('path1')">
      <div class="landing-card-badge badge-blue">Path 1</div>
      <h3>${P1.document.replace('Path 1 — ','')}</h3>
      <p>${P1.duration} · ${P1.friday_features.length} Features · ${P1.end_goal}</p>
      <div class="arrow">→</div>
    </div>`;
}

// === PHASE 0 ===
function buildPhase0(){
  const c=document.getElementById('phase0-content');
  let h='<div class="back-btn" onclick="navigate(\'\')">← Back to Home</div>';
  h+=`<div class="section-header"><div class="section-badge badge-green">Phase 0</div><h2 class="section-title">${P0.document}</h2><p class="section-subtitle">${P0.goal}</p></div>`;
  // Setup
  h+=`<div class="glass-card green-glow" style="margin-bottom:48px"><h3 style="font-size:18px;font-weight:700;margin-bottom:12px">${P0.setup.title}</h3><ol style="padding-left:18px">${P0.setup.steps.map(s=>`<li style="margin-bottom:8px;font-size:13px;color:rgba(255,255,255,.55)">${s}</li>`).join('')}</ol></div>`;
  // C vs Python
  h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:16px">${P0.c_vs_python.title}</h3>`;
  h+=`<div class="glass-card green-glow" style="overflow-x:auto;margin-bottom:48px"><table class="premium-table"><thead><tr><th>Concept</th><th>C</th><th>Python</th></tr></thead><tbody>${P0.c_vs_python.comparison.map(r=>`<tr><td style="font-weight:600;color:rgba(255,255,255,.8)">${r.concept}</td><td><code>${esc(r.c)}</code></td><td><code>${esc(r.python)}</code></td></tr>`).join('')}</tbody></table></div>`;
  // Weeks
  h+='<div class="weeks-grid">';
  P0.weeks.forEach((week,wi)=>{
    const id=`p0w${wi}`;
    searchIndex.push({type:'Phase 0',title:`Week ${week.week}: ${week.title}`,id,detail:week.goal||'',page:'phase0'});
    let days='';
    if(week.days){week.days.forEach(d=>{
      let inner='';
      if(d.concepts)inner+=d.concepts.map(c=>`<div style="font-size:13px;color:rgba(255,255,255,.45);padding:2px 0">• ${c}</div>`).join('');
      if(d.practice)inner+=`<div style="margin-top:6px;font-size:13px;color:rgba(34,197,94,.7)">Practice: ${d.practice}</div>`;
      if(d.project&&typeof d.project==='object'&&d.project.requirements)inner+=`<div style="margin-top:6px"><div style="font-size:13px;font-weight:600;color:rgba(34,197,94,.8);margin-bottom:3px">Project:</div>${d.project.requirements.map(r=>`<div style="font-size:13px;color:rgba(255,255,255,.45);padding:2px 0">✦ ${r}</div>`).join('')}</div>`;
      else if(d.project&&typeof d.project==='string')inner+=`<div style="margin-top:6px;font-size:13px;color:rgba(34,197,94,.7)">Project: ${d.project}</div>`;
      if(d.key_concepts)inner+=`<div style="font-size:13px;color:rgba(255,255,255,.45)">${d.key_concepts}</div>`;
      days+=`<div class="day-item"><div class="day-label">Day ${d.day}</div><div class="day-topic">${d.topic}</div>${inner}</div>`;
      searchIndex.push({type:'Phase 0',title:`W${week.week} D${d.day}: ${d.topic}`,id,detail:d.practice||d.key_concepts||'',page:'phase0'});
    });}
    if(week.readiness_test_requirements){days+=`<div style="margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:6px;color:rgba(34,197,94,.8)">Readiness Test</div>${week.readiness_test_requirements.map(r=>`<div style="font-size:13px;color:rgba(255,255,255,.45);padding:2px 0">✦ ${r}</div>`).join('')}</div>`;}
    // Week resource link
    let weekRes='';
    if(week.resource)weekRes=`<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.3)">📖 ${week.resource}</div>`;
    h+=`<div class="glass-card green-glow" id="${id}"><div class="week-card-header" onclick="toggleWeek('${id}')"><div><div class="week-num">Week ${week.week}</div><div class="week-title">${week.title}</div>${week.goal?`<div style="font-size:12px;color:rgba(255,255,255,.3);margin-top:3px">${week.goal}</div>`:''}${weekRes}</div><div style="display:flex;align-items:center;gap:10px"><label class="week-check" onclick="event.stopPropagation()"><input type="checkbox" data-week="${id}" onchange="updateProgress()"></label><div class="week-toggle">+</div></div></div><div class="week-body" id="${id}-body">${days}</div></div>`;
  });
  h+='</div>';
  // Mistakes
  h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin:48px 0 16px">Common Mistakes</h3>`;
  h+=`<div class="glass-card green-glow" style="overflow-x:auto;margin-bottom:48px"><table class="premium-table"><thead><tr><th>Mistake</th><th>Wrong</th><th>Correct</th></tr></thead><tbody>${P0.common_mistakes.map(m=>`<tr><td style="color:rgba(255,255,255,.7)">${m.mistake}</td><td><code style="color:rgba(239,68,68,.7)">${esc(m.wrong)}</code></td><td><code style="color:rgba(34,197,94,.7)">${esc(m.correct)}</code></td></tr>`).join('')}</tbody></table></div>`;
  // Resources (clickable links)
  h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin:48px 0 16px">Resources</h3><div class="resource-chips">${P0.resources.map(r=>resLink(r)).join('')}</div>`;
  // Study structure
  if(P0.daily_study_structure){h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin:48px 0 16px">Daily Study Structure (${P0.daily_study_structure.total_minutes} min)</h3><div class="glass-card green-glow">${P0.daily_study_structure.blocks.map(b=>`<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-weight:700;color:rgba(34,197,94,.7)">${b.duration}</span> — <span style="color:rgba(255,255,255,.55)">${b.activity}</span></div>`).join('')}</div>`;}
  c.innerHTML=h;
  document.getElementById('footer-p0').textContent=`${P0.project} · ${P0.created_by}, ${P0.role}`;
}

// === PATH 1 ===
function buildPath1(){
  const c=document.getElementById('path1-content');
  let h='<div class="back-btn" onclick="navigate(\'\')">← Back to Home</div>';
  h+=`<div class="section-header"><div class="section-badge badge-blue">Path 1</div><h2 class="section-title">${P1.document}</h2><p class="section-subtitle">${P1.end_goal}</p></div>`;
  // Features
  const fi=['💬','🧠','🗂️','🎤','🔊','🔍','📄','🎭','🌐','🚀'];
  h+='<div class="features-grid">';
  P1.friday_features.forEach((f,i)=>{h+=`<div class="glass-card blue-glow feature-card"><div class="feature-icon">${fi[i]||'✦'}</div><div class="feature-title">${f.feature}</div><div class="feature-desc">${f.description}</div><span class="feature-month-badge">${f.built_in}</span></div>`;searchIndex.push({type:'Feature',title:f.feature,id:'p1-features',detail:f.description,page:'path1'});});
  h+='</div>';
  // Tech Stack
  h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:16px">Tech Stack</h3><div class="chip-row">${P1.tech_stack.map(t=>`<div class="chip" title="${t.purpose} — ${t.used_by}">${t.technology}</div>`).join('')}</div>`;
  // Team
  h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:16px">Team <button onclick="openEditTeam()" style="font-size:12px;font-weight:500;color:rgba(99,102,241,.7);margin-left:8px;cursor:pointer;background:none;border:none">✏️ Edit Names</button></h3><div class="team-grid" id="team-grid-container">`;
  const savedNames=JSON.parse(localStorage.getItem('jarvis_team_names')||'{}');
  P1.team_roles.forEach((t,i)=>{const name=savedNames[i]||t.member;const ini=name.replace(/Member \d+ — ?/,'').slice(0,2).toUpperCase()||name.charAt(name.length-1);h+=`<div class="glass-card blue-glow team-card"><div class="team-avatar">${ini}</div><div class="team-name" data-member-idx="${i}">${name}</div><div class="team-role">${t.role}</div><div class="team-resp">${t.responsibility}</div></div>`;});
  h+='</div>';
  // Months
  P1.months.forEach(month=>{
    h+=`<div class="month-section" id="p1m${month.month}"><div class="month-dot"></div><h3 class="month-title">Month ${month.month}: ${month.title}</h3><p class="month-goal">${month.goal}</p>`;
    month.weeks.forEach((week,wi)=>{
      const id=`p1m${month.month}w${wi}`;
      searchIndex.push({type:'Path 1',title:`Week ${week.week}: ${week.title}`,id,detail:'',page:'path1'});
      let tasks='';
      if(week.tasks){tasks=week.tasks.map(t=>{searchIndex.push({type:'Path 1 Task',title:t.task,id,detail:t.detail,page:'path1'});return `<div class="day-item"><div class="day-topic">${t.task}</div><div class="day-detail">${t.detail}</div></div>`;}).join('');}
      let cp='';
      if(week.checkpoint){cp=`<div class="checkpoint-list"><div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(59,130,246,.6);margin-bottom:10px">Checkpoint</div>${week.checkpoint.map(c=>`<div class="checkpoint-item"><div class="checkpoint-dot"></div>${c}</div>`).join('')}</div>`;}
      h+=`<div class="glass-card blue-glow" id="${id}" style="margin-bottom:16px"><div class="week-card-header" onclick="toggleWeek('${id}')"><div><div class="week-num">Week ${week.week}</div><div class="week-title">${week.title}</div></div><div style="display:flex;align-items:center;gap:10px"><label class="week-check" onclick="event.stopPropagation()"><input type="checkbox" data-week="${id}" onchange="updateProgress()"></label><div class="week-toggle">+</div></div></div><div class="week-body" id="${id}-body">${tasks}${cp}</div></div>`;
    });
    h+='</div>';
  });
  // Resources (clickable)
  h+=`<h3 style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin:48px 0 16px">Resources</h3>`;
  for(const cat in P1.resources){
    h+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px">${cat.replace(/_/g,' ')}</div><div class="resource-chips">${P1.resources[cat].map(r=>resLink(r)).join('')}</div></div>`;
  }
  c.innerHTML=h;
  document.getElementById('footer-p1').textContent=`${P1.project} · ${P1.created_by}, ${P1.role}`;
}

// === SCROLL TO ELEMENT (for nav links) ===
function scrollToEl(id){const el=document.getElementById(id);if(el){const y=el.getBoundingClientRect().top+window.pageYOffset-80;window.scrollTo({top:y,behavior:'smooth'});}}

// === EDIT TEAM NAMES ===
function openEditTeam(){
  let modal=document.getElementById('edit-team-modal');
  if(!modal){modal=document.createElement('div');modal.id='edit-team-modal';modal.className='edit-modal-bg';document.body.appendChild(modal);}
  const savedNames=JSON.parse(localStorage.getItem('jarvis_team_names')||'{}');
  let fields='';
  P1.team_roles.forEach((t,i)=>{fields+=`<label>${t.role}</label><input id="team-name-${i}" value="${(savedNames[i]||t.member).replace(/"/g,'&quot;')}" placeholder="${t.member}">`;});
  modal.innerHTML=`<div class="edit-modal"><h3>✏️ Edit Team Names</h3><p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:8px">Changes are saved locally and will persist across visits.</p>${fields}<div class="edit-modal-actions"><button class="edit-btn secondary" onclick="closeEditTeam()">Cancel</button><button class="edit-btn primary" onclick="saveTeamNames()">Save</button></div></div>`;
  modal.classList.add('open');
}
function closeEditTeam(){const m=document.getElementById('edit-team-modal');if(m)m.classList.remove('open');}
function saveTeamNames(){
  const names={};
  P1.team_roles.forEach((t,i)=>{const v=document.getElementById('team-name-'+i).value.trim();if(v)names[i]=v;});
  localStorage.setItem('jarvis_team_names',JSON.stringify(names));
  closeEditTeam();
  // Rebuild Path 1 to reflect changes
  searchIndex=searchIndex.filter(s=>s.page!=='path1');
  buildPath1();
  loadProgress();
}

// === SHARED ===
function toggleWeek(id){const b=document.getElementById(id+'-body');const t=document.getElementById(id).querySelector('.week-toggle');if(b.classList.contains('open')){b.style.maxHeight='0';b.classList.remove('open');t.textContent='+';}else{b.classList.add('open');b.style.maxHeight=b.scrollHeight+200+'px';t.textContent='−';}}

function updateProgress(){
  const cbs=document.querySelectorAll('[data-week]');
  const state={};
  cbs.forEach(cb=>{state[cb.dataset.week]=cb.checked;const card=document.getElementById(cb.dataset.week);if(card)card.classList.toggle('completed',cb.checked);});
  localStorage.setItem('jarvis_progress',JSON.stringify(state));
  // Per-page progress
  const prefix=currentPage==='phase0'?'p0w':currentPage==='path1'?'p1m':'';
  let total=0,done=0;
  cbs.forEach(cb=>{if(!prefix||cb.dataset.week.startsWith(prefix)){total++;if(cb.checked)done++;}});
  if(total>0){document.getElementById('progress-circle').style.strokeDashoffset=87.96*(1-done/total);}
  document.getElementById('progress-text').textContent=`${done} / ${total} weeks`;
}

function loadProgress(){try{const st=JSON.parse(localStorage.getItem('jarvis_progress')||'{}');Object.entries(st).forEach(([id,checked])=>{const cb=document.querySelector(`[data-week="${id}"]`);if(cb)cb.checked=checked;});}catch(e){}updateProgress();}

// === PARTICLES ===
function initParticles(){const cv=document.getElementById('particles-canvas');if(!cv)return;const ctx=cv.getContext('2d');let w,h,pts=[];function resize(){w=cv.width=window.innerWidth;h=cv.height=window.innerHeight;}resize();window.addEventListener('resize',resize);for(let i=0;i<35;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.3+.1});function draw(){ctx.clearRect(0,0,w,h);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.o})`;ctx.fill();});requestAnimationFrame(draw);}draw();}

// === CURSOR GLOW ===
document.addEventListener('mousemove',e=>{const g=document.getElementById('cursor-glow');g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';});

// === SEARCH ===
function openSearch(){document.getElementById('search-overlay').classList.add('open');document.getElementById('search-input').focus();}
function closeSearch(){document.getElementById('search-overlay').classList.remove('open');document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML='';}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}if(e.key==='Escape')closeSearch();});
document.getElementById('search-overlay').addEventListener('click',e=>{if(e.target.id==='search-overlay')closeSearch();});
document.getElementById('search-input').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();const res=document.getElementById('search-results');
  if(!q){res.innerHTML='';return;}
  const matches=searchIndex.filter(s=>s.title.toLowerCase().includes(q)||s.detail.toLowerCase().includes(q)).slice(0,12);
  res.innerHTML=matches.map(m=>`<div class="search-result-item" onclick="goTo('${m.page||''}','${m.id}')"><div class="search-result-type">${m.type}</div><div class="search-result-title">${hl(m.title,q)}</div>${m.detail?`<div class="search-result-detail">${hl(m.detail,q)}</div>`:''}</div>`).join('')||'<div style="padding:20px;font-size:14px;color:rgba(255,255,255,.3);text-align:center">No results</div>';
});
function hl(t,q){if(!q)return t;return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');}
function goTo(page,id){closeSearch();if(page)navigate(page);setTimeout(()=>{const el=document.getElementById(id);if(el){const y=el.getBoundingClientRect().top+window.pageYOffset-80;window.scrollTo({top:y,behavior:'smooth'});toggleWeek(id);}},200);}

loadData();
</script>
